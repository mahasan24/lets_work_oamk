name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check-types
        env:
          # Web check-types runs vite build; placeholders only for CI.
          VITE_SERVER_URL: https://letswork.dev
          VITE_APP_URL: https://letswork.dev
          VITE_CLOUDINARY_CLOUD_NAME: placeholder

      - name: Build
        run: bun run build
        env:
          VITE_SERVER_URL: https://letswork.dev
          VITE_APP_URL: https://letswork.dev
          VITE_CLOUDINARY_CLOUD_NAME: placeholder
