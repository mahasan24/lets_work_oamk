name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /opt/lets_work
            if [ ! -f .env.production ]; then
              echo "Missing /opt/lets_work/.env.production on the VPS"
              exit 1
            fi
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh
